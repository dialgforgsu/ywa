<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bios — Y'all We Asian</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --off-black: #111111; --panel: #161616;
      --red: #e8173a; --white: #f0ede6; --muted: #6b6760; --gold: #c9a84c;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-accent: 'Noto Serif JP', serif;
    }
    html, body { background: var(--black); color: var(--white); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; height: 72px; background: rgba(10,10,10,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.06); }
    .nav-logo { font-family: var(--font-display); font-size: 1.55rem; letter-spacing: 0.06em; color: var(--white); text-decoration: none; line-height: 1; display: flex; align-items: center; }
    .nav-logo .red { color: var(--red); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-family: var(--font-body); font-size: 0.78rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover { color: var(--white); }
    .nav-links a.active { color: var(--red); }

    /* PAGE */
    main { padding: 120px 0 80px; animation: fadeUp 0.5s ease forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
    .section-label { font-family: var(--font-accent); font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--red); margin-bottom: 0.5rem; }

    /* BIOS */
    .bios-header { max-width: 1200px; margin: 0 auto 4rem; padding: 0 3rem; }
    .bios-header h1 { font-family: var(--font-display); font-size: clamp(3rem, 6vw, 5.5rem); letter-spacing: 0.03em; }

    .bios-grid { max-width: 1200px; margin: 0 auto; padding: 0 3rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2px; }

    .bio-card { background: var(--panel); overflow: hidden; position: relative; cursor: pointer; transition: transform 0.3s ease; }
    .bio-card:hover { z-index: 2; transform: scale(1.015); }
    .bio-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; display: block; filter: brightness(0.82); transition: filter 0.3s; }
    .bio-card:hover .bio-img { filter: brightness(0.48); }
    .bio-img-placeholder { width: 100%; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 5rem; color: rgba(232,23,58,0.2); transition: filter 0.3s; filter: brightness(0.75); }
    .bio-card:hover .bio-img-placeholder { filter: brightness(0.45); }
    .bio-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(10,10,10,0.97) 0%, rgba(10,10,10,0.55) 45%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 1.6rem; opacity: 1; }
    .bio-desc { font-size: 0.8rem; line-height: 1.65; color: rgba(240,237,230,0.82); margin-bottom: 0.85rem; opacity: 0; transform: translateY(8px); transition: opacity 0.3s 0.05s, transform 0.3s 0.05s; }
    .bio-card:hover .bio-desc { opacity: 1; transform: translateY(0); }
    .bio-role { font-family: var(--font-accent); font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(240,237,230,0.92); margin-bottom: 0.22rem; }
    .bio-since { font-size: 0.68rem; letter-spacing: 0.12em; color: rgba(240,237,230,0.92); margin-bottom: 0.18rem; }
    .bio-pronouns { font-size: 0.68rem; letter-spacing: 0.12em; color: rgba(240,237,230,0.92); margin-bottom: 0.55rem; }
    .bio-name { font-family: var(--font-display); font-size: 1.8rem; letter-spacing: 0.04em; line-height: 1; margin-bottom: 0.35rem; }
    .bio-hometown { font-size: 0.76rem; color: rgba(240,237,230,0.78); letter-spacing: 0.08em; }

    /* FULL BIO MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; padding: 2rem; backdrop-filter: blur(6px); }
    .modal-overlay.open { display: flex; }
    .modal-wrapper { position: relative; max-width: 680px; width: 100%; animation: fadeUp 0.3s ease; }
    .modal { background: var(--panel); width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid rgba(255,255,255,0.08); }
    .modal-img-placeholder { width: 100%; height: 320px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 8rem; color: rgba(232,23,58,0.15); overflow: hidden; }
    .modal-img-placeholder img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .modal-body { padding: 2rem 2.5rem 2.5rem; }
    .modal-tag { font-family: var(--font-accent); font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--red); }
    .modal-name { font-family: var(--font-display); font-size: 3rem; letter-spacing: 0.04em; line-height: 1; margin: 0.3rem 0 0.5rem; }
    .modal-hometown { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 1.5rem; }
    .modal-divider { height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 1.5rem; }
    .modal-text { font-size: 0.95rem; line-height: 1.85; color: rgba(240,237,230,0.75); }
    .modal-close { position: absolute; top: 0.8rem; right: 0.8rem; background: rgba(20,20,20,0.75); border: none; color: #F5F3E8; font-size: 1.1rem; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 10; }
    .modal-close:hover { background: var(--red); }
    .modal-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(20,20,20,0.75); border: none; color: #F5F3E8; font-size: 1.2rem; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; z-index: 10; }
    .modal-nav:hover { background: var(--red); }
    .modal-nav-prev { left: -52px; }
    .modal-nav-next { right: -52px; }
    @media (max-width: 820px) { .modal-nav-prev { left: 0.5rem; } .modal-nav-next { right: 0.5rem; } }

    /* FOOTER */
    footer { border-top: 1px solid rgba(255,255,255,0.06); padding: 2.5rem 3rem; display: flex; align-items: center; justify-content: space-between; margin-top: 5rem; }
    .footer-logo { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.06em; }
    .footer-logo span { color: var(--red); }
    .footer-copy { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; }
    .footer-social { display: flex; gap: 1.2rem; }
    .footer-social a { font-size: 0.72rem; text-decoration: none; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; transition: color 0.2s; }
    .footer-social a:hover { color: var(--red); }

    @media (max-width: 900px) { nav { padding: 0 1.5rem; } .nav-links { gap: 1.5rem; } .bios-header, .bios-grid { padding: 0 1.5rem; } footer { padding: 2rem 1.5rem; flex-direction: column; gap: 1rem; text-align: center; } }
    @media (max-width: 600px) { .nav-links { display: none; } .bios-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Y'ALL&nbsp;<span class="red">WE</span>&nbsp;ASIAN</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About Us</a></li>
    <li><a href="bios.html" class="active">Bios</a></li>
    <li><a href="gallery.html">Social Media</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<main>
  <div class="bios-header">
    <p class="section-label">The Ensemble</p>
    <h1>MEET<br>THE CAST</h1>
  </div>
  <div class="bios-grid" id="bios-grid"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-wrapper">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <button class="modal-nav modal-nav-prev" onclick="navigateModal(-1)">&#8592;</button>
    <button class="modal-nav modal-nav-next" onclick="navigateModal(1)">&#8594;</button>
    <div class="modal" id="modal-body-scroll">
      <div class="modal-img-placeholder" id="modal-img"></div>
      <div class="modal-body">
        <div class="modal-tag" id="modal-tag"></div>
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-hometown" id="modal-hometown"></div>
        <div class="modal-divider"></div>
        <div class="modal-text" id="modal-text"></div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-logo">Y'ALL <span>WE</span> ASIAN</div>
  <div class="footer-copy">© 2017 Y'all We Asian. All rights reserved.</div>
  <div class="footer-social">
    <a href="https://www.instagram.com/yallweasian" target="_blank">Instagram</a>
    <a href="https://www.facebook.com/yallweasian" target="_blank">Facebook</a>
    <a href="https://www.tiktok.com/@ywaimprov" target="_blank">TikTok</a>
  </div>
</footer>

<script>
  const members = [
    { name: "G-SU PAEK", role: "Co-Founding Member", since: "2017", pronouns: "He/Him", hometown: "South Korea → Austin, TX", color: "#2a1a14", photo: "images/gsu-paek-GP1.png", cardPhotoPos: "center 8%", modalFit: "contain",
      desc: "A longtime improv veteran who has performed at hundreds of venues and festivals across the country. Co-founder of Hot Pot Comedy, Austin’s first and only all Asian-American sketch troupe.",
      full: "G-Su Paek is a longtime improv veteran and has performed at hundreds of venues and a handful of festivals across the country. He is also an accomplished actor, comedian, and one of the founders of Hot Pot Comedy, Austin’s first and only all Asian-American sketch troupe. You can find G-Su performing and teaching improv mainly at the Fallout Theater in Austin, Texas or follow him on instagram: @gsu.paek" },
    { name: "VIRGIL SHELBY", role: "Co-Founding Member", since: "2017", pronouns: "They/Them", hometown: "Singapore → Austin, TX", color: "#12201a", photo: "images/virgil-shelby.png", modalFit: "contain",
      desc: "An actor, comedian, and performer based in Austin, TX. One of the five co-owners of Fallout Theater and a member of Hot Pot Comedy and Y’all We Asian.",
      full: "Virgil Shelby is an actor, comedian, and performer based in Austin, TX. They are one of the five co-owners of Fallout Theater, as well as a member of incredibly famous and well-known comedy troupes such as Hot Pot Comedy and Y’all We Asian. Offstage, you can find them trying to befriend stray cats or on social media at @virgillikesyou" },
    { name: "NICK FUNG", role: "Main Cast", since: "2019", pronouns: "He/Him", hometown: "Austin, TX", color: "#141a0f", photo: "images/nick-fung.jpg", modalFit: "contain",
      desc: "An Austin-based improviser, actor, and sketch writer. Founder of Silk Mangos, the first Asian American theater troupe at UT Austin. Known to sleep diagonally and doesn’t think it’s weird.",
      full: "Nick Fung is a fun guy. An Austin-based improviser, actor, and sketch writer. He’s a thankful graduate of both ColdTowne Conservatory and Fallout Theater. Other credits include founder of Silk Mangos, the first Asian American theater troupe at UT Austin. He’s also been known to sleep diagonally and doesn’t think it’s weird. Follow him on Instagram: @a_fung_guy" },
    { name: "NORMAN TRAN", role: "Main Cast", since: "2019", pronouns: "He/Him", hometown: "Austin, TX", color: "#1a1424", photo: "images/Norman-Tran.jpg",
      desc: "Norman has been doing improv in Austin, TX for about a decade. After his day job as a software engineer he thinks creating things with friends is the best part of life.",
      full: "Norman Tran has been doing improv in Austin, TX for about a decade. After his day job as a software engineer he thinks creating things with friends is the best part of life." },
    { name: "SUNNY HUANG", role: "Main Cast", since: "2019", pronouns: "She/Her", hometown: "Los Angeles, CA → Austin, TX", color: "#201410", photo: "images/sunny-huang.png", modalFit: "contain",
      desc: "An Austin-based improviser and actress recently moved from Los Angeles. Studied at UCB and performed with Mess Hall team Bordeaux. Briefly ate an ice cream cone in a John Legend music video.",
      full: "Sunny Huang is an Austin-based improviser and actress who recently moved from Los Angeles. Sunny has been improvising since 2015 and studied at the Upright Citizens Brigade, where she performed with Mess Hall team, Bordeaux, as well as multiple indie teams. To date, her greatest artistic accomplishment is briefly eating an ice cream cone in a John Legend music video. Sunny is represented by Collier Talent Agency." },
    { name: "UDAY WAGHMARE", role: "Main Cast", since: "2019", pronouns: "He/Him", hometown: "India → Austin, TX", color: "#1a1a24", photo: "images/Uday-Waghmare.jpg",
      desc: "Originally from Mumbai, Uday has been in Austin for about 9 years. A ColdTowne graduate and part of the Age/Sex/Location troupe that won ThrowDowne.",
      full: "Uday Waghmare is originally from Mumbai India, and he’s been in Austin for about 9 years, working for a tech company. Uday graduated from ColdTowne. At first, he hated improv, but he’s come around to find it’s FUN! He was part of Age/Sex/Location troupe that won ThrowDowne last year." },
    { name: "MARY VO", role: "Main Cast", since: "2021", pronouns: "She/Her", hometown: "Austin, TX", color: "#141a20", photo: "images/Mary-Vo-1.jpg", modalFit: "contain",
      desc: "A maker of laughs and pastries. Performing improv since 2019, also seen in MprovTV. Outside of comedy, she resumes daily life as a bookish cat lady.",
      full: "Mary Vo is a maker of laughs and pastries. She has been doing improv since 2019 and has also performed in MprovTV. Outside of comedy, she resumes daily life as a bookish cat lady. Follow her on Instagram: @contraryvo" },
    { name: "ANANYA ROY", role: "Main Cast", since: "2024", pronouns: "She/Her", hometown: "Austin, TX", color: "#1a0f18",
      desc: "",
      full: "" },
    { name: "ATTIYA ALI", role: "Main Cast", since: "2024", pronouns: "She/Her", hometown: "Austin, TX", color: "#0f1a18", photo: "images/attiya-ali.jpg", modalFit: "contain",
      desc: "",
      full: "" },
  ];

  const grid = document.getElementById('bios-grid');
  members.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'bio-card';
    const imgEl = m.photo
      ? `<img class="bio-img" src="${m.photo}" alt="${m.name}" loading="lazy" style="${m.cardStyle || 'object-position:' + (m.cardPhotoPos||'top')}">`
      : `<div class="bio-img-placeholder" style="background: linear-gradient(160deg, ${m.color} 0%, #0e0e0e 100%);">${m.name.charAt(0)}</div>`;
    card.innerHTML = `${imgEl}
      <div class="bio-overlay">
        <div class="bio-desc">${m.desc}</div>
        <div class="bio-role">${m.role}</div>
        <div class="bio-since">${m.since} – Present</div>
        ${m.pronouns ? `<div class="bio-pronouns">${m.pronouns}</div>` : ''}
        <div class="bio-name">${m.name}</div>
      </div>`;
    card.addEventListener('click', () => openModal(m));
    grid.appendChild(card);
  });

  let currentModalIndex = 0;
  function openModal(m) {
    currentModalIndex = members.indexOf(m);
    renderModal(m);
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function renderModal(m) {
    const img = document.getElementById('modal-img');
    if (m.photo) {
      img.style.cssText = 'background:#0e0e0e;padding:0;';
      img.innerHTML = `<img src="${m.photo}" alt="${m.name}" style="width:100%;height:100%;object-fit:${m.modalFit||'cover'};object-position:${m.modalPhotoPos || 'top'};">`;
    } else {
      img.style.background = `linear-gradient(160deg, ${m.color} 0%, #0e0e0e 100%)`;
      img.textContent = m.name.charAt(0);
    }
    document.getElementById('modal-tag').textContent = m.pronouns ? `${m.role}  ·  ${m.since} – Present  ·  ${m.pronouns}` : `${m.role}  ·  ${m.since} – Present`;
    document.getElementById('modal-name').textContent = m.name;
    document.getElementById('modal-hometown').textContent = '';
    document.getElementById('modal-text').textContent = m.full || m.desc;
    document.getElementById('modal-body-scroll').scrollTop = 0;
  }
  function navigateModal(dir) {
    currentModalIndex = (currentModalIndex + dir + members.length) % members.length;
    renderModal(members[currentModalIndex]);
  }
  function closeModalDirect() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function closeModal(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModalDirect();
    if (e.key === 'ArrowLeft') navigateModal(-1);
    if (e.key === 'ArrowRight') navigateModal(1);
  });
</script>
</body>
</html>
